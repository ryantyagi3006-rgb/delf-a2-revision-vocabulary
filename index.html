  .subtitle { color: #666; font-size: 0.9rem; margin-bottom: 2rem; }
  .btn { display: block; width: 100%; text-align: left; padding: 0.75rem 1rem; margin-bottom: 0.6rem; background: #fff; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 1rem; font-family: Georgia, serif; color: #222; }

  .btn.primary { background: #2a4a2a; color: #fff; border-color: #2a4a2a; }
  .btn.primary:hover { background: #1d341d; }
  .btn.back { background: none; border: none; color: #555; padding: 0 0 1.5rem 0; cursor: pointer; font-size: 0.9rem; font-family: Georgia, serif; width: auto; }
  .btn.back:hover { color: #222; }
  .vocab-section { margin-bottom: 2rem; }
  .vocab-section h3 { border-bottom: 1px solid #ddd; padding-bottom: 0.3rem; margin-bottom: 0.75rem; }
  .vocab-table { width: 100%; border-collapse: collapse; font-size: 0.95rem; }
  .vocab-table td { padding: 0.4rem 0.5rem; border-bottom: 1px solid #eee; }
  .vocab-table td:first-child { font-weight: bold; width: 45%; color: #1a3a1a; }
  .vocab-table td:last-child { color: #444; }
  .quiz-question { margin-bottom: 1.5rem; }
  .quiz-question p { font-size: 1rem; margin-bottom: 0.6rem; font-weight: bold; }
  .option { display: block; width: 100%; text-align: left; padding: 0.6rem 0.9rem; margin-bottom: 0.4rem; background: #fff; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 0.95rem; font-family: Georgia, serif; color: #222; }
  .option:hover:not(:disabled) { background: #f0f0e8; }
  .option.correct { background: #e6f4e6; border-color: #4a844a; color: #1a3a1a; }
  .option.wrong { background: #faeaea; border-color: #c44; color: #600; }
  .option:disabled { cursor: default; }
  #quiz-result { font-size: 1.1rem; margin-top: 1rem; padding: 1rem; background: #fff; border: 1px solid #ccc; border-radius: 4px; }
  .week-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin-bottom: 1rem; }
  @media(max-width:480px) { .week-grid { grid-template-columns: 1fr; } }
  .tag { display: inline-block; font-size: 0.75rem; background: #eee; padding: 0.15rem 0.5rem; border-radius: 10px; margin-left: 0.5rem; color: #666; vertical-align: middle; }
  .divider { border: none; border-top: 1px solid #ddd; margin: 1.5rem 0; }
  header {
  display: flex;
  align-items: center;
  padding: 10px 20px;

.logo {

.resources a.btn {

let currentWeek = 0;
let userAnswers = {};

function show(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  window.scrollTo(0, 0);
}

function renderHome() {
  const list = document.getElementById('week-list');
  list.innerHTML = '';
  data.weeks.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.innerHTML = '<strong>' + w.title + '</strong> <span class="tag">' + w.theme + '</span>';
    btn.onclick = () => openWeek(i);
    list.appendChild(btn);
  });
}

function openWeek(i) {
  currentWeek = i;
  const w = data.weeks[i];
  document.getElementById('week-title').textContent = w.title + ' — ' + w.theme;
  document.getElementById('week-theme').textContent = w.days.length + ' days of vocabulary';
  const list = document.getElementById('day-list');
  list.innerHTML = '';
  w.days.forEach((d, j) => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.innerHTML = '<strong>' + d.title + '</strong> <span class="tag">' + d.theme + '</span>';
    btn.onclick = () => openDay(i, j);
    list.appendChild(btn);
  });
  show('week');
}

function openDay(wi, di) {
  currentWeek = wi;
  const d = data.weeks[wi].days[di];
  document.getElementById('day-title').textContent = data.weeks[wi].title + ' · ' + d.title;
  document.getElementById('day-theme').textContent = d.theme;
  document.getElementById('day-back-btn').onclick = () => openWeek(wi);
  const container = document.getElementById('day-vocab');
  container.innerHTML = '';
  const section = document.createElement('div');
  section.className = 'vocab-section';
  const table = document.createElement('table');
  table.className = 'vocab-table';
  d.vocab.forEach(([fr, en]) => {
    const row = document.createElement('tr');
    row.innerHTML = '<td>' + fr + '</td><td>' + en + '</td>';
    table.appendChild(row);
  });
  section.appendChild(table);
  container.appendChild(section);
  show('day');
}

function startQuiz() {
  const w = data.weeks[currentWeek];
  document.getElementById('quiz-title').textContent = w.title + ' Quiz — ' + w.theme;
  document.getElementById('quiz-back-btn').onclick = () => openWeek(currentWeek);
  const container = document.getElementById('quiz-questions');
  container.innerHTML = '';
  userAnswers = {};
  document.getElementById('quiz-result').style.display = 'none';
  document.getElementById('quiz-submit').style.display = 'block';

  w.quiz.forEach((q, qi) => {
    const div = document.createElement('div');
    div.className = 'quiz-question';
    div.innerHTML = '<p>' + (qi + 1) + '. ' + q.q + '</p>';
    q.options.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      btn.textContent = opt;
      btn.dataset.qi = qi;
      btn.dataset.oi = oi;
      btn.onclick = function() {
        document.querySelectorAll('[data-qi="' + qi + '"]').forEach(b => b.classList.remove('selected-opt'));
        this.classList.add('selected-opt');
        userAnswers[qi] = oi;
      };
      div.appendChild(btn);
    });
    container.appendChild(div);
  });
  show('quiz');
}

function submitQuiz() {
  const w = data.weeks[currentWeek];
  const total = w.quiz.length;
  let score = 0;

  w.quiz.forEach((q, qi) => {
    const buttons = document.querySelectorAll('[data-qi="' + qi + '"]');
    const chosen = userAnswers[qi];
    buttons.forEach(btn => {
      btn.disabled = true;
      const oi = parseInt(btn.dataset.oi);
      if (oi === q.answer) btn.classList.add('correct');
      else if (oi === chosen && chosen !== q.answer) btn.classList.add('wrong');
    });
    if (chosen === q.answer) score++;
  });

  const result = document.getElementById('quiz-result');
  result.style.display = 'block';
  let msg = '';
  if (score === total) msg = 'Perfect score! Excellent work.';
  else if (score >= total * 0.7) msg = 'Well done! Keep revising the ones you missed.';
  else msg = 'Keep practising — review the vocabulary and try again.';
  result.innerHTML = '<strong>Score: ' + score + ' / ' + total + '</strong><br>' + msg;
  document.getElementById('quiz-submit').style.display = 'none';
}

renderHome();
</script>
